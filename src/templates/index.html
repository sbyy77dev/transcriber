<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Transcriber</title>
    <link rel="stylesheet" href="/static/styles.css?v=4">
</head>

<body>
    <nav class="top-menu">
        <button id="menuButton" class="menu-button" type="button" aria-label="메뉴 열기">
            ☰
        </button>

        <div id="sideMenu" class="side-menu">
            <div class="side-menu-header">
                <strong>Transcriber</strong>
                <button id="closeMenuButton" class="close-menu-button" type="button">×</button>
            </div>

            <a href="/" class="side-menu-link active">단일 파일 변환/받아쓰기</a>
            <a href="/merge" class="side-menu-link">여러 파일 MP3 병합</a>
        </div>

        <div id="menuOverlay" class="menu-overlay"></div>
    </nav>
    <main class="page">
        <div class="container">
            <h1 class="title">Transcriber</h1>

            <p class="subtitle">
                MKV, MP4, AVI, MOV, WEBM, MP3, WAV 파일을 업로드하면<br>
                원하는 작업만 선택해서 실행할 수 있습니다.
            </p>

            <form id="uploadForm" enctype="multipart/form-data">
                <label id="uploadBox" class="upload-box" for="fileInput">
                    <div class="upload-icon">🎧</div>
                    <div class="upload-title">파일을 드래그하거나 클릭해서 업로드</div>
                    <div class="upload-desc">
                        지원 형식: .mkv, .mp4, .avi, .mov, .webm, .mp3, .wav, .m4a
                    </div>
                    <div id="fileName" class="file-name">선택된 파일 없음</div>
                </label>

                <input
                    id="fileInput"
                    type="file"
                    name="file"
                    accept=".mkv,.mp4,.avi,.mov,.webm,.mp3,.wav,.m4a"
                    required
                >

                <input id="actionInput" type="hidden" name="action" value="both">

                <div class="option-row">
                    <label for="language">언어</label>
                    <select id="language" name="language">
                        <option value="ko" selected>한국어</option>
                        <option value="en">영어</option>
                        <option value="ja">일본어</option>
                        <option value="zh">중국어</option>
                    </select>
                </div>

                <div class="option-row">
                    <label for="modelName">모델</label>
                    <select id="modelName" name="model_name">
                        <option value="base">base, 기존 Whisper / 빠름 / 완료 후 전체 표시</option>
                        <option value="small" selected>small, 기존 Whisper / 기본 추천 / 완료 후 전체 표시</option>
                        <option value="medium">medium, 기존 Whisper / 느림 / 완료 후 전체 표시</option>
                        <option value="faster-base">faster-base, faster-whisper / 한 줄씩 표시 / 빠름</option>
                        <option value="faster-small">faster-small, faster-whisper / 한 줄씩 표시 / 기본</option>
                        <option value="faster-medium">faster-medium, faster-whisper / 한 줄씩 표시 / 느림</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="submit-button secondary action-button" type="button" data-action="mp3_only">
                        MP3만 만들기
                    </button>

                    <button class="submit-button secondary action-button" type="button" data-action="transcript_only">
                        받아쓰기만 하기
                    </button>

                    <button class="submit-button action-button" type="button" data-action="both">
                        MP3 + 받아쓰기
                    </button>
                </div>

                <p class="notice">
                    기존 Whisper는 단계만 표시하고 완료 후 결과가 나타납니다.
                    faster-whisper 모델은 받아쓰기 문장이 생성되는 대로 화면에 표시됩니다.
                </p>
            </form>

            <section id="resultSection" class="result-section">
                <div class="status-card">
                    <p id="statusStep" class="status-step">대기 중</p>
                    <p id="statusMessage" class="status-message">작업을 기다리고 있습니다.</p>

                    <div class="progress-wrapper">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                    <div id="progressText" class="progress-text">0%</div>
                </div>

                <h2 id="transcriptTitle" class="section-title" style="display: none;">받아쓰기 결과</h2>
                <div id="transcriptBox" class="transcript-box"></div>

                <h2 id="downloadTitle" class="section-title" style="display: none;">다운로드</h2>
                <ul id="downloadList" class="download-list"></ul>

                <a id="resetLink" class="reset-link" href="/">새 파일 변환하기</a>
            </section>
        </div>
    </main>

    <script src="/static/app.js?v=3"></script>
</body>
</html>
